apiVersion: apps/v1
kind: Deployment
metadata:
  name: spark-streaming-app
  namespace: cc-project
spec:
  replicas: 1
  selector:
    matchLabels:
      app: spark-streaming-app
  template:
    metadata:
      labels:
        app: spark-streaming-app
    spec:
      containers:
      - name: spark
        image: spark-streaming:2.1 
        imagePullPolicy: IfNotPresent
        command: 
          - "/opt/spark/bin/spark-submit"
          - "--master"
          - "local[*]"
          - "spark/streaming_app.py"
          - "--input"
          - "/var/log/nginx/stream" 
          - "--checkpoint"
          - "/app/checkpoints/spark"
        volumeMounts:
        - name: nginx-logs
          mountPath: /var/log/nginx
        - name: spark-checkpoints
          mountPath: /app/checkpoints
      volumes:
      - name: nginx-logs
        persistentVolumeClaim:
          claimName: nginx-logs-pvc
      - name: spark-checkpoints
        persistentVolumeClaim:
          claimName: spark-checkpoint-pvc