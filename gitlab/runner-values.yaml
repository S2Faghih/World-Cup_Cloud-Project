# Core configurations for the GitLab Runner agent execution environment
runners:
  config: |
    [[runners]]
      [runners.kubernetes]
        namespace = "cc-project"
        # Mirror for the temporary job pods
        image = "registry.docker.ir/library/ubuntu:22.04"
        privileged = true
        
        # Explicitly route the helper image through the mirror registry
        helper_image = "registry.docker.ir/gitlab/gitlab-runner-helper:x86_64-v19.1.1"