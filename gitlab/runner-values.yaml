image:
  registry: "registry.docker.ir"
  image: "gitlab/gitlab-runner"

gitlabUrl: "http://gitlab.cc-project.svc.cluster.local:8929"

runnerRegistrationToken: "your token"

runners:
  config: |
    [[runners]]
      executor = "kubernetes"
      [runners.kubernetes]
        namespace = "cc-project"
        image = "registry.docker.ir/library/ubuntu:22.04"
        privileged = false
        image_pull_policies = ["if-not-present"]
        allowed_pull_policies = ["if-not-present", "always", "never"]
        helper_image = "registry.docker.ir/gitlab/gitlab-runner-helper:x86_64-v16.11.2"
