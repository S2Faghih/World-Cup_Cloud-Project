apiVersion: apps/v1
kind: Deployment
metadata:
  name: gitlab
  namespace: cc-project
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gitlab
  template:
    metadata:
      labels:
        app: gitlab
    spec:
      containers:
      - name: gitlab
        image: registry.docker.ir/gitlab/gitlab-ce:16.11.2-ce.0
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8929
          name: http
        - containerPort: 22
          name: ssh
        env:
        - name: GITLAB_OMNIBUS_CONFIG
          value: |
            external_url 'http://gitlab.cc-project.svc.cluster.local:8929'
            gitlab_rails['gitlab_shell_ssh_port'] = 30022
        volumeMounts:
        - name: gitlab-data
          mountPath: /var/opt/gitlab
      volumes:
      - name: gitlab-data
        persistentVolumeClaim:
          claimName: gitlab-data-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: gitlab
  namespace: cc-project
spec:
  type: NodePort
  selector:
    app: gitlab
  ports:
  - port: 8929
    targetPort: 8929
    nodePort: 30880
    name: http
  - port: 22
    targetPort: 22
    nodePort: 30022
    name: ssh
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: gitlab-data-pvc
  namespace: cc-project
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi