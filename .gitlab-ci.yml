stages:
  - test
  - build
  - deploy
  - traffic
  - mapreduce
  - validate
  - report
  - publish

variables:
  NS: cc-project
  REGISTRY: registry.cc-project.svc.cluster.local:5000

# ----------------- 1. TEST -----------------
test-logic:
  stage: test
  image: registry.docker.ir/library/python:3.9-slim
  script:
    - echo "Running basic syntax and logic checks..."
    - python3 -m py_compile traffic-generator/traffic_generator.py
    - python3 -m py_compile spark/streaming_app.py
    - echo "All Python syntax checks passed!"

# ----------------- 2. BUILD -----------------
# We use Kaniko to build images inside the cluster without Docker daemon
build-match:
  stage: build
  image:
    name: gcr.io/kaniko-project/executor:debug
    entrypoint: [""]
  script:
    - /kaniko/executor --context $CI_PROJECT_DIR/match-service --dockerfile $CI_PROJECT_DIR/match-service/Dockerfile --destination $REGISTRY/match-service:latest

build-team:
  stage: build
  image:
    name: gcr.io/kaniko-project/executor:debug
    entrypoint: [""]
  script:
    - /kaniko/executor --context $CI_PROJECT_DIR/team-service --dockerfile $CI_PROJECT_DIR/team-service/Dockerfile --destination $REGISTRY/team-service:latest

build-stadium:
  stage: build
  image:
    name: gcr.io/kaniko-project/executor:debug
    entrypoint: [""]
  script:
    - /kaniko/executor --context $CI_PROJECT_DIR/stadium-service --dockerfile $CI_PROJECT_DIR/stadium-service/Dockerfile --destination $REGISTRY/stadium-service:latest

build-traffic:
  stage: build
  image:
    name: gcr.io/kaniko-project/executor:debug
    entrypoint: [""]
  script:
    - /kaniko/executor --context $CI_PROJECT_DIR/traffic-generator --dockerfile $CI_PROJECT_DIR/traffic-generator/Dockerfile --destination $REGISTRY/traffic-generator:latest

build-hadoop:
  stage: build
  image:
    name: gcr.io/kaniko-project/executor:debug
    entrypoint: [""]
  script:
    - /kaniko/executor --context $CI_PROJECT_DIR --dockerfile $CI_PROJECT_DIR/Dockerfile.hadoop --destination $REGISTRY/hadoop-streaming:latest

# ----------------- 3. DEPLOY -----------------
deploy-services:
  stage: deploy
  image: registry.docker.ir/bitnami/kubectl:latest
  script:
    - echo "Deploying base storages, backends, and nginx..."
    - kubectl apply -f k8s/01-storages.yaml -n $NS
    - kubectl apply -f k8s/02-backends.yaml -n $NS
    - kubectl apply -f k8s/03-nginx.yaml -n $NS
    # Wait for nginx to be ready before generating traffic
    - kubectl rollout status deployment/nginx-gateway -n $NS --timeout=120s

# ----------------- 4. TRAFFIC -----------------
generate-traffic:
  stage: traffic
  image: registry.docker.ir/bitnami/kubectl:latest
  script:
    - echo "Starting Traffic Generator Job..."
    # Delete old job if it exists to restart it
    - kubectl delete job traffic-generator-job -n $NS --ignore-not-found=true
    - kubectl apply -f k8s/04-traffic.yaml -n $NS
    - kubectl wait --for=condition=complete job/traffic-generator-job -n $NS --timeout=300s

# ----------------- 5. MAPREDUCE -----------------
run-mapreduce:
  stage: mapreduce
  image: registry.docker.ir/bitnami/kubectl:latest
  script:
    - echo "Starting Hadoop MapReduce Pipeline..."
    - kubectl delete job mapreduce-pipeline -n $NS --ignore-not-found=true
    - kubectl apply -f k8s/05-mapreduce.yaml -n $NS
    - kubectl wait --for=condition=complete job/mapreduce-pipeline -n $NS --timeout=600s

# ----------------- 6. VALIDATE -----------------
validate-outputs:
  stage: validate
  image: registry.docker.ir/library/python:3.9-slim
  script:
    # We use a simple python script to validate the output file generated by Hadoop
    - echo "Validating summary.json from the shared volume..."
    - |
      cat << 'EOF' > validate.py
      import json, os, sys
      file_path = "/project/outputs/final/summary.json"
      if not os.path.exists(file_path):
          print("ERROR: summary.json not found!")
          sys.exit(1)
      with open(file_path, 'r') as f:
          data = json.load(f)
          if "total_requests" not in data or "popular_team_by_country" not in data:
              print("ERROR: Missing required keys in summary.json!")
              sys.exit(1)
      print("Validation Passed!")
      EOF
    - python3 validate.py

# ----------------- 7. REPORT -----------------
generate-report:
  stage: report
  image: registry.docker.ir/library/python:3.9-slim
  script:
    - echo "Generating simple HTML dashboard..."
    - |
      cat << 'EOF' > generate_html.py
      import json
      with open("/project/outputs/final/summary.json", 'r') as f:
          data = json.load(f)
      html = f"""
      <html><head><title>Cloud Final Dashboard</title></head>
      <body style='font-family: Arial; padding: 20px;'>
          <h2>CC Project Final Report</h2>
          <p><b>Total Requests:</b> {data['total_requests']}</p>
          <p><b>Highest Error Rate:</b> {data['error_rates'][0][0]} ({data['error_rates'][0][1]:.2f}%)</p>
          <hr>
          <h3>Popular Teams by Country</h3>
          <ul>
          {''.join([f"<li>{c}: {t[0][0]}</li>" for c, t in data['popular_team_by_country'].items()])}
          </ul>
      </body></html>
      """
      with open("/project/outputs/final/index.html", 'w') as out:
          out.write(html)
      EOF
    - python3 generate_html.py

# ----------------- 8. PUBLISH -----------------
publish-dashboard:
  stage: publish
  image: registry.docker.ir/bitnami/kubectl:latest
  script:
    - echo "Deploying Report Web Server..."
    - |
      cat << 'EOF' > report-web.yaml
      apiVersion: apps/v1
      kind: Deployment
      metadata: { name: report-web }
      spec:
        replicas: 1
        selector: { matchLabels: { app: report-web } }
        template:
          metadata: { labels: { app: report-web } }
          spec:
            containers:
            - name: web
              image: registry.docker.ir/library/nginx:1.27-alpine
              volumeMounts:
              - { name: data, mountPath: /usr/share/nginx/html, subPath: outputs/final }
            volumes:
            - name: data
              persistentVolumeClaim: { claimName: nginx-logs-pvc }
      ---
      apiVersion: v1
      kind: Service
      metadata: { name: report-web }
      spec:
        type: NodePort
        selector: { app: report-web }
        ports: [{ port: 80, targetPort: 80, nodePort: 30090 }]
      EOF
    - kubectl apply -f report-web.yaml -n $NS
    - echo "Dashboard published at http://localhost:30090/index.html"