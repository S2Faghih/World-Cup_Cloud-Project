stages:
  - test
  - build
  - deploy
  - traffic
  - mapreduce
  - validate
  - report
  - publish

variables:
  NS: cc-project
  REGISTRY: registry.cc-project.svc.cluster.local:5000
  HTTP_PROXY: "http://host.minikube.internal:8889"
  HTTPS_PROXY: "http://host.minikube.internal:8889"
  NO_PROXY: "localhost,127.0.0.1,10.0.0.0/8,192.168.0.0/16,192.168.49.2,.svc,.cluster.local,host.minikube.internal"

# ----------------- 1. TEST -----------------
test-logic:
  stage: test
  image:
    name: registry.docker.ir/library/python:3.9-slim
    pull_policy: if-not-present
  script:
    - echo "Running basic syntax and logic checks..."
    - python3 -m py_compile traffic-generator/traffic_generator.py
    - python3 -m py_compile spark/streaming_app.py
    - echo "All Python syntax checks passed!"

# ----------------- 2. BUILD -----------------
build-match:
  stage: build
  image:
    name: gcr.io/kaniko-project/executor:debug
    entrypoint: [""]
    pull_policy: if-not-present
  script:
    - /kaniko/executor --context $CI_PROJECT_DIR/match-service --dockerfile $CI_PROJECT_DIR/match-service/Dockerfile --no-push --build-arg HTTP_PROXY=$HTTP_PROXY --build-arg HTTPS_PROXY=$HTTPS_PROXY

build-team:
  stage: build
  image:
    name: gcr.io/kaniko-project/executor:debug
    entrypoint: [""]
    pull_policy: if-not-present
  script:
    - /kaniko/executor --context $CI_PROJECT_DIR/team-service --dockerfile $CI_PROJECT_DIR/team-service/Dockerfile --no-push --build-arg HTTP_PROXY=$HTTP_PROXY --build-arg HTTPS_PROXY=$HTTPS_PROXY

build-stadium:
  stage: build
  image:
    name: gcr.io/kaniko-project/executor:debug
    entrypoint: [""]
    pull_policy: if-not-present
  script:
    - /kaniko/executor --context $CI_PROJECT_DIR/stadium-service --dockerfile $CI_PROJECT_DIR/stadium-service/Dockerfile --no-push --build-arg HTTP_PROXY=$HTTP_PROXY --build-arg HTTPS_PROXY=$HTTPS_PROXY

build-traffic:
  stage: build
  image:
    name: gcr.io/kaniko-project/executor:debug
    entrypoint: [""]
    pull_policy: if-not-present
  script:
    - /kaniko/executor --context $CI_PROJECT_DIR/traffic-generator --dockerfile $CI_PROJECT_DIR/traffic-generator/Dockerfile --no-push --build-arg HTTP_PROXY=$HTTP_PROXY --build-arg HTTPS_PROXY=$HTTPS_PROXY

build-hadoop:
  stage: build
  image:
    name: gcr.io/kaniko-project/executor:debug
    entrypoint: [""]
    pull_policy: if-not-present
  script:
    - /kaniko/executor --context $CI_PROJECT_DIR --dockerfile $CI_PROJECT_DIR/Dockerfile.hadoop --no-push --build-arg HTTP_PROXY=$HTTP_PROXY --build-arg HTTPS_PROXY=$HTTPS_PROXY

# ----------------- 3. DEPLOY -----------------
deploy-services:
  stage: deploy
  image:
    name: registry.docker.ir/bitnami/kubectl:latest
    pull_policy: if-not-present
  script:
    - echo "Deploying base storages, backends, and nginx..."
    - kubectl apply -f k8s/01-storages.yaml -n $NS
    - kubectl apply -f k8s/02-backends.yaml -n $NS
    - kubectl apply -f k8s/03-nginx.yaml -n $NS
    - kubectl rollout status deployment/nginx-gateway -n $NS --timeout=120s

# ----------------- 4. TRAFFIC -----------------
generate-traffic:
  stage: traffic
  image:
    name: registry.docker.ir/bitnami/kubectl:latest
    pull_policy: if-not-present
  script:
    - echo "Starting Traffic Generator Job..."
    - kubectl delete job traffic-generator-job -n $NS --ignore-not-found=true
    - kubectl apply -f k8s/04-traffic.yaml -n $NS
    - kubectl wait --for=condition=complete job/traffic-generator-job -n $NS --timeout=300s

# ----------------- 5. MAPREDUCE -----------------
run-mapreduce:
  stage: mapreduce
  image:
    name: registry.docker.ir/bitnami/kubectl:latest
    pull_policy: if-not-present
  script:
    - echo "Starting Hadoop MapReduce Pipeline..."
    - kubectl delete job mapreduce-pipeline -n $NS --ignore-not-found=true
    - kubectl apply -f k8s/05-mapreduce.yaml -n $NS
    - kubectl wait --for=condition=complete job/mapreduce-pipeline -n $NS --timeout=600s

# ----------------- 6. VALIDATE -----------------
validate-outputs:
  stage: validate
  image:
    name: registry.docker.ir/bitnami/kubectl:latest
    pull_policy: if-not-present
  script:
    - echo "Running Validation Job inside Kubernetes to access the shared PVC..."
    - |
      cat << 'EOF' > validate-job.yaml
      apiVersion: batch/v1
      kind: Job
      metadata: { name: validate-job }
      spec:
        template:
          spec:
            restartPolicy: Never
            containers:
            - name: python-validator
              image: registry.docker.ir/library/python:3.9-slim
              command: ["python3", "-c"]
              args:
                - |
                  import json, os, sys
                  file_path = "/project/outputs/final/summary.json"
                  if not os.path.exists(file_path):
                      print("ERROR: summary.json not found in PVC!")
                      sys.exit(1)
                  with open(file_path, 'r') as f:
                      data = json.load(f)
                      if "total_requests" not in data or "popular_team_by_country" not in data:
                          print("ERROR: Missing required keys in summary.json!")
                          sys.exit(1)
                  print("Validation Passed Successfully!")
              volumeMounts:
              - name: data
                mountPath: /project
            volumes:
            - name: data
              persistentVolumeClaim: { claimName: nginx-logs-pvc }
      EOF
    - kubectl delete job validate-job -n $NS --ignore-not-found=true
    - kubectl apply -f validate-job.yaml -n $NS
    - kubectl wait --for=condition=complete job/validate-job -n $NS --timeout=120s

# ----------------- 7. REPORT -----------------
generate-report:
  stage: report
  image:
    name: registry.docker.ir/bitnami/kubectl:latest
    pull_policy: if-not-present
  script:
    - echo "Generating HTML Report inside Kubernetes to save directly to the shared PVC..."
    - |
      cat << 'EOF' > report-job.yaml
      apiVersion: batch/v1
      kind: Job
      metadata: { name: report-job }
      spec:
        template:
          spec:
            restartPolicy: Never
            containers:
            - name: python-reporter
              image: registry.docker.ir/library/python:3.9-slim
              command: ["python3", "-c"]
              args:
                - |
                  import json
                  with open("/project/outputs/final/summary.json", 'r') as f:
                      data = json.load(f)
                  html = f"""
                  <html><head><title>Cloud Final Dashboard</title></head>
                  <body style='font-family: Arial; padding: 20px;'>
                      <h2>CC Project Final Report</h2>
                      <p><b>Total Requests:</b> {data['total_requests']}</p>
                      <p><b>Highest Error Rate:</b> {data['error_rates'][0][0]} ({data['error_rates'][0][1]:.2f}%)</p>
                      <hr>
                      <h3>Popular Teams by Country</h3>
                      <ul>
                      {''.join([f"<li>{c}: {t[0][0]}</li>" for c, t in data['popular_team_by_country'].items()])}
                      </ul>
                  </body></html>
                  """
                  with open("/project/outputs/final/index.html", 'w') as out:
                      out.write(html)
                  print("Dashboard successfully written to PVC!")
              volumeMounts:
              - name: data
                mountPath: /project
            volumes:
            - name: data
              persistentVolumeClaim: { claimName: nginx-logs-pvc }
      EOF
    - kubectl delete job report-job -n $NS --ignore-not-found=true
    - kubectl apply -f report-job.yaml -n $NS
    - kubectl wait --for=condition=complete job/report-job -n $NS --timeout=120s

# ----------------- 8. PUBLISH -----------------
publish-dashboard:
  stage: publish
  image:
    name: registry.docker.ir/bitnami/kubectl:latest
    pull_policy: if-not-present
  script:
    - echo "Deploying Report Web Server..."
    - |
      cat << 'EOF' > report-web.yaml
      apiVersion: apps/v1
      kind: Deployment
      metadata: { name: report-web }
      spec:
        replicas: 1
        selector: { matchLabels: { app: report-web } }
        template:
          metadata: { labels: { app: report-web } }
          spec:
            containers:
            - name: web
              image: registry.docker.ir/library/nginx:1.27-alpine
              volumeMounts:
              - { name: data, mountPath: /usr/share/nginx/html, subPath: outputs/final }
            volumes:
            - name: data
              persistentVolumeClaim: { claimName: nginx-logs-pvc }
      ---
      apiVersion: v1
      kind: Service
      metadata: { name: report-web }
      spec:
        type: NodePort
        selector: { app: report-web }
        ports: [{ port: 80, targetPort: 80, nodePort: 30090 }]
      EOF
    - kubectl apply -f report-web.yaml -n $NS
    - echo "Dashboard published at http://localhost:30090/index.html"