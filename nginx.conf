events {}

http {
    # Define upstream backend services with their specific internal ports
    upstream match_up { server match-service:8000; }
    upstream stadium_up { server stadium-service:8000; }
    upstream team_up { server team-service:8000; }

    # Define structured JSON log format required for the MapReduce phase
    log_format json_logs escape=json '{"timestamp":"$time_iso8601", "request_id": "$http_x_request_id", "client_ip": "$remote_addr", "client_country":"$http_x_client_country", "scenario": "$http_x_scenario", "method": "$request_method", "path": "$request_uri", "service": "$target_service", "status_code": $status, "request_time_sec":"$request_time", "user_agent":"$http_user_agent"}';
    
    # Set the destination for Nginx access logs
    access_log /var/log/nginx/nginx_access.log json_logs;

    server {
        # Listen on standard HTTP port
        listen 80;
        
        # Default service name fallback
        set $target_service "unknown";

        # Route traffic to the match service (Port 8000)
        location /api/matches { 
            set $target_service match-service; 
            proxy_pass http://match_up;
            
            # Forward essential headers to the backend service
            proxy_set_header X-Request-ID $http_x_request_id;
            proxy_set_header X-Client-Country $http_x_client_country;
            proxy_set_header X-Scenario $http_x_scenario;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
        
        # Route traffic to the team service (Port 8002)
        location /api/teams { 
            set $target_service team-service; 
            proxy_pass http://team_up;
            
            # Forward essential headers to the backend service
            proxy_set_header X-Request-ID $http_x_request_id;
            proxy_set_header X-Client-Country $http_x_client_country;
            proxy_set_header X-Scenario $http_x_scenario;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
        
        # Route traffic to the stadium service (Port 8001)
        location /api/stadiums { 
            set $target_service stadium-service; 
            proxy_pass http://stadium_up;
            
            # Forward essential headers to the backend service
            proxy_set_header X-Request-ID $http_x_request_id;
            proxy_set_header X-Client-Country $http_x_client_country;
            proxy_set_header X-Scenario $http_x_scenario;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }
}